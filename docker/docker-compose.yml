services:
  # ── SQLAtlas metadata database ──
  postgres:
    image: postgres:16-alpine
    container_name: sqlatlas-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sqlatlas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-sqlatlas}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sqlatlas}"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis (cache + sessions) ──
  redis:
    image: redis:7-alpine
    container_name: sqlatlas-redis
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Parsing Engine (Python/FastAPI) ──
  parsing-engine:
    build:
      context: ../apps/parsing-engine
      dockerfile: Dockerfile
    container_name: sqlatlas-parser
    environment:
      PARSER_DEBUG: "false"
      PARSER_HOST: "0.0.0.0"
      PARSER_PORT: "8100"
      PARSER_LOG_LEVEL: "INFO"
    ports:
      - "${PARSER_PORT:-8100}:8100"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── API Gateway (NestJS) ──
  api-gateway:
    build:
      context: ..
      dockerfile: apps/api-gateway/Dockerfile
    container_name: sqlatlas-api
    environment:
      NODE_ENV: production
      PORT: "3000"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${POSTGRES_USER:-sqlatlas}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      DB_DATABASE: ${POSTGRES_DB:-sqlatlas}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRATION: 15m
      PARSING_ENGINE_URL: http://parsing-engine:8100
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      CREDENTIAL_BACKEND: aes
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?Set CREDENTIAL_ENCRYPTION_KEY in .env}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-closed}
      MULTI_TENANT: ${MULTI_TENANT:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-}
      ORG_NAME: ${ORG_NAME:-}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      parsing-engine:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  redisdata:
